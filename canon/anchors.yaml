version: 0.1.0
updated_at: 2026-03-22
owner: project-lead

anchors:
  - id: ANC-WORLD-001
    domain: world
    title: 稷下论场是核心舞台
    statement: 所有核心对局都发生在稷下论场语境，不引入平行宇宙设定。
    status: active
  - id: ANC-WORLD-002
    domain: world
    title: 论辩胜负由证据与秩序决定
    statement: 游戏冲突体现思想博弈，不以血腥叙事作为主驱动。
    status: active
  - id: ANC-FACTION-001
    domain: faction
    title: 墨家核心价值
    statement: 兼爱、非攻、尚贤、节用。
    status: active
  - id: ANC-FACTION-002
    domain: faction
    title: 儒家核心价值
    statement: 礼治、仁义、教化、正名。
    status: active
  - id: ANC-FACTION-003
    domain: faction
    title: MVP只启用双学派
    statement: MVP阶段仅启用墨家与儒家，其他学派进入待扩展池。
    status: active
  - id: ANC-RULE-001
    domain: rules
    title: 卡牌产物必须结构化
    statement: 所有可提交卡牌都必须是JSON文件并可通过门禁脚本。
    status: active
  - id: ANC-RULE-002
    domain: rules
    title: 无引用不入库
    statement: lore_anchor_ids为空或缺失的卡牌不得进入候选池。
    status: active
  - id: ANC-RULE-003
    domain: rules
    title: 复杂度优先受限
    statement: 单卡规则文本与关键词数量受硬阈值约束。
    status: active
  - id: ANC-RULE-004
    domain: rules
    title: 新设定默认冻结
    statement: 未经NEW_CANON_PROPOSAL流程批准，不得新增锚点。
    status: active
  - id: ANC-RULE-005
    domain: rules
    title: 每日批次上限
    statement: 每天最多处理1个Batch，建议10张卡以内。
    status: active
  - id: ANC-MECH-001
    domain: mechanics
    title: 机制数量上限
    statement: MVP核心机制控制在3-5个。
    status: active
  - id: ANC-MECH-002
    domain: mechanics
    title: 先机制后扩量
    statement: 机制未收敛前不得扩展卡牌总量。
    status: active
  - id: ANC-MECH-003
    domain: mechanics
    title: 平衡阈值
    statement: 快测目标区间为胜率45%-55%。
    status: active
  - id: ANC-PIPE-001
    domain: pipeline
    title: 单一可信源
    statement: 仅仓库文件可作为事实源，对话文本不是最终依据。
    status: active
  - id: ANC-PIPE-002
    domain: pipeline
    title: 自动门禁优先
    statement: 先跑自动化门禁，再进入人工评审。
    status: active
  - id: ANC-PIPE-003
    domain: pipeline
    title: 可复现约束
    statement: 每批卡牌必须记录batch_id、models_used、canon_version和seed。
    status: active
  - id: ANC-RISK-001
    domain: risk
    title: 优先防一致性崩坏
    statement: 一致性崩坏与范围蔓延属于P0风险，优先治理。
    status: active
  - id: ANC-RISK-002
    domain: risk
    title: 范围蔓延统一进backlog
    statement: 新想法有价值但暂不做，统一记录至backlog。
    status: active
  - id: ANC-RISK-003
    domain: risk
    title: 平衡不收敛处理流程
    statement: 冻结新卡 -> 删复杂卡 -> 回滚稳定tag。
    status: active
  - id: ANC-OPS-001
    domain: ops
    title: 版本可回滚
    statement: 关键阶段必须打tag，必要时回滚到最近稳定点。
    status: active
  - id: ANC-OPS-002
    domain: ops
    title: Hotfix分支策略
    statement: 线上阻断问题只允许从hotfix分支修复并回合并。
    status: active
  - id: ANC-CONTENT-001
    domain: content
    title: 引用义务
    statement: AI生成文本若不能引用锚点ID，直接丢弃。
    status: active
  - id: ANC-CONTENT-002
    domain: content
    title: 术语受控
    statement: rules_text仅允许使用terminology.yaml登记术语。
    status: active
  - id: ANC-CONTENT-003
    domain: content
    title: MVP先文本后美术
    statement: 在核心卡稳定前，采用纯文本牌面即可。
    status: active
